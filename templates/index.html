 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP4 Cloud Computing - تسجيل المستخدمين</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1> TP4 Cloud Computing</h1>
        <h2>تطبيق هجين: SQL + NoSQL</h2>
        
        <div class="card">
            <h3>تسجيل مستخدم جديد</h3>
            <form action="/add_user" method="POST">
                <label for="nom">الاسم الكامل:</label>
                <input type="text" id="nom" name="nom" placeholder="أدخل اسمك" required>
                
                <label for="email">البريد الإلكتروني:</label>
                <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                
                <button type="submit">تسجيل</button>
            </form>
        </div>
        
        <div class="info-box">
            <p><strong>تخزين البيانات:</strong></p>
            <ul>
                <li>SQLite: جدول المستخدمين (علاقاتي)</li>
                <li>MongoDB: سجل الأنشطة (NoSQL)</li>
            </ul>
        </div>
        
        <div class="links">
            <a href="/users" target="_blank">عرض جميع المستخدمين (SQLite)</a>
            <a href="/logs" target="_blank">عرض سجل الأنشطة (MongoDB)</a>
        </div>
    </div>
</body>
</html>
